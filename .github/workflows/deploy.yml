name: Deploy to Production

on:
  push:
    branches: [master]

# Require manual approval before deploying
environment: production

jobs:
  deploy:
    name: Deploy to all institutions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup PHP ─────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      # ── 3. Install Composer dependencies (including Deployer) ────────
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      # ── 4. Setup SSH ─────────────────────────────────────────────────
      - name: Setup SSH key and known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/college_deploy_key
          chmod 600 ~/.ssh/college_deploy_key

          # Add known hosts for both servers
          ssh-keyscan -t rsa,ed25519 69.197.187.20 >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -t rsa,ed25519 62.77.158.206 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

          # Configure SSH to use deploy key for both servers
          cat >> ~/.ssh/config << 'EOF'
          Host 69.197.187.20
            IdentityFile ~/.ssh/college_deploy_key
            StrictHostKeyChecking yes
            User administrator

          Host 62.77.158.206
            IdentityFile ~/.ssh/college_deploy_key
            StrictHostKeyChecking yes
            User pnmtc
          EOF
          chmod 600 ~/.ssh/config

      # ── 5. Deploy to MHTIA ───────────────────────────────────────────
      - name: Deploy to MHTIA (portal.mhtia.edu.gh)
        run: vendor/bin/dep deploy mhtia --no-interaction -vvv
        continue-on-error: false

      # ── 6. Deploy to PNMTC ───────────────────────────────────────────
      - name: Deploy to PNMTC (college.pnmtc.edu.gh)
        run: vendor/bin/dep deploy pnmtc --no-interaction -vvv
        continue-on-error: false

      # ── 7. Notify on failure ─────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed. Check logs above. Run 'dep rollback <host>' to revert."
