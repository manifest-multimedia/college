name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to MHTIA + PNMTC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --optimize-autoloader --no-interaction

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_COLLEGE }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 69.197.187.20 >> ~/.ssh/known_hosts
          ssh-keyscan -H 62.77.158.206 >> ~/.ssh/known_hosts

      - name: Write deploy.php from secret
        run: echo "${{ secrets.DEPLOY_PHP_COLLEGE }}" > deploy.php

      - name: Deploy to all institutions
        env:
          GITHUB_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN_COLLEGE }}
        run: |
          # Inject token into repo URL so servers can pull private repo
          sed -i "s|https://github.com/manifest-multimedia/college.git|https://x-access-token:${GITHUB_TOKEN}@github.com/manifest-multimedia/college.git|" deploy.php
          php vendor/bin/dep deploy:unlock mhtia --no-interaction || true
          php vendor/bin/dep deploy:unlock pnmtc --no-interaction || true
          php vendor/bin/dep deploy mhtia --no-interaction -vvv
          php vendor/bin/dep deploy pnmtc --no-interaction -vvv
